{% extends 'base.html' %}
{% block title %}{{ _('form.register_title') }} — {{ _('site.name') }}{% endblock %}
{% block content %}

<div class="form-card">
    <h1>🎮 {{ _('form.register_title') }}</h1>
    <form method="POST">
        <div class="form-group">
            <label>{{ _('form.username') }}</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>{{ _('form.password') }}</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="submit-btn">{{ _('form.register_title') }}</button>
    </form>
    <div class="form-footer">
        {{ _('form.login_prompt') }} <a href="{{ url_for('login') }}">{{ _('form.login_link') }}</a>
    </div>
</div>

{% endblock %}
