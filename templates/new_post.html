{% extends 'base.html' %}
{% block title %}Write a Guide — GameGuide Hub{% endblock %}
{% block content %}

<div class="form-card form-card-wide">
    <h1>✍️ Write a Guide</h1>
    <p class="form-subtitle">Share your gaming knowledge with the community</p>
    <form method="POST">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required placeholder="e.g. Cities: Skylines 2 — Beginner's Guide">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Category</label>
                <select name="category">
                    {% for cat in categories %}
                        <option value="{{ cat }}">{{ get_category_icon(cat) }} {{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Cover Image URL (optional)</label>
                <input type="url" name="cover_url" placeholder="https://example.com/image.jpg">
            </div>
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea name="content" required placeholder="Write your guide here... Use ## for headings, - for lists, and **bold** for emphasis."></textarea>
            <div class="form-hint">💡 Use ## for headings, - for bullet lists, **bold** for emphasis, and blank lines between paragraphs.</div>
        </div>
        <button type="submit" class="submit-btn">Publish Guide</button>
    </form>
</div>

{% endblock %}
