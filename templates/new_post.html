{% extends 'base.html' %}
{% block title %}发布攻略 - 都市天际线2 攻略站{% endblock %}
{% block content %}

<div class="form-card" style="max-width:700px;">
    <h1>发布攻略</h1>
    <form method="POST">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" required placeholder="例如：新手开局规划思路分享">
        </div>
        <div class="form-group">
            <label>分类</label>
            <select name="category">
                {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>内容</label>
            <textarea name="content" required placeholder="分享你的城市建造心得、交通规划技巧或模组推荐……"></textarea>
        </div>
        <button type="submit" class="submit-btn">发布</button>
    </form>
</div>

{% endblock %}
