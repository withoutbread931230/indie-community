<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}都市天际线2 攻略站{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>">
</head>
<body>
    <nav class="topbar">
        <div class="topbar-inner">
            <a href="{{ url_for('index') }}" class="logo">🌆 都市<span>天际线2</span></a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">首页</a>
                <a href="{{ url_for('new_post') }}">发布攻略</a>
                {% if g.user %}
                    <span class="user-info"><a href="{{ url_for('profile', user_id=g.user['id']) }}"><strong>{{ g.user['username'] }}</strong></a> | <a href="{{ url_for('logout') }}">退出</a></span>
                {% else %}
                    <a href="{{ url_for('login') }}">登录</a>
                    <a href="{{ url_for('register') }}" class="btn">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
